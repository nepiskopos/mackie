# Platform skill file for Facebook.
# Mackie loads this file on every conversation turn — changes take effect immediately
# without any restart or code change.
#
# Safe to edit: all fields below.
# To add a new platform, copy this file to skills/{platform}.yaml with a unique id field.
#
# Fields:
#   name:          Display name referenced in responses (e.g. "Facebook")
#   id:            Machine-readable identifier — must be unique, lowercase, no spaces
#   tone:          Writing style guide injected into the system prompt each turn
#   max_length:    Character limit for posts on this platform
#   hashtag_count: Recommended number of hashtags (can be a range, e.g. "1-3")
#   hashtag_style: Guidance on hashtag selection — what kinds work on this platform
#   format_hints:  Multi-line block of platform-specific formatting tips

name: Facebook
id: facebook
tone: friendly, conversational, neighbor-to-neighbor — talk like you know them
max_length: 63206
hashtag_count: "1-3"
hashtag_style: minimal and natural — only if they flow in the text
format_hints: |
  - Most conversational and personal of the three platforms
  - Longer storytelling is fine; lead with the emotional hook
  - Great for event announcements, community stories, volunteer spotlights
  - Tag relevant people, partners, or locations where appropriate
  - Clear CTA: donate, share, attend, volunteer
  - Ask questions to encourage comments ("Have you seen this?", "Who can help?")
